function getEndpointFromProcessNumber(num) {
  var clean = num.replace(/\D/g, '');
  if (clean.length !== 20) return null;
  var justica = clean.substring(13, 14);
  var tribunal = clean.substring(14, 16);
  var key = justica + '.' + tribunal;
  if (TRIBUNAL_MAP[key]) return TRIBUNAL_MAP[key];
  key = justica + '.' + tribunal.replace(/^0/, '');
  if (TRIBUNAL_MAP[key]) return TRIBUNAL_MAP[key];
  key = justica + '.00';
  if (TRIBUNAL_MAP[key]) return TRIBUNAL_MAP[key];
  return null;
}

function queryDataJud(endpoint, body) {
  var targetUrl = DATAJUD_BASE + '/' + endpoint + '/_search';
  var bodyStr = JSON.stringify(body);
  var proxyIndex = 0;
  function tryProxy(resolve, reject) {
    if (proxyIndex >= CORS_PROXIES.length) {
      return tryDirect(resolve, reject);
    }
    var proxy = CORS_PROXIES[proxyIndex];
    var ct = (proxyIndex === 0) ? 'application/x-ndjson' : 'application/json';
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 20000);
    fetch(proxy + targetUrl, {
      method: 'POST',
      headers: { 'Content-Type': ct, 'Authorization': 'APIKey ' + DATAJUD_API_KEY },
      body: bodyStr,
      signal: controller.signal
    }).then(function(resp) {
      clearTimeout(timeout);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }).then(function(data) {
      if (data.error) throw new Error(data.error.reason || JSON.stringify(data.error).substring(0,150));
      console.log('[DataJud] Success via proxy ' + proxyIndex);
      resolve(data);
    }).catch(function(err) {
      clearTimeout(timeout);
      console.warn('[DataJud] Proxy ' + proxyIndex + ' failed:', err.message);
      proxyIndex++;
      tryProxy(resolve, reject);
    });
  }
  function tryDirect(resolve, reject) {
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 15000);
    fetch(targetUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'APIKey ' + DATAJUD_API_KEY },
      body: bodyStr,
      signal: controller.signal
    }).then(function(resp) {
      clearTimeout(timeout);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }).then(function(data) {
      if (data.error) throw new Error(data.error.reason || JSON.stringify(data.error).substring(0,150));
      resolve(data);
    }).catch(function(err) {
      clearTimeout(timeout);
      reject(new Error('Nao foi possivel conectar ao DataJud. Tente novamente. (' + err.message + ')'));
    });
  }
  return new Promise(function(resolve, reject) { tryProxy(resolve, reject); });
}

function showLoading(text) {
  document.getElementById('loading').classList.add('visible');
  document.getElementById('loading-text').textContent = text || 'Consultando DataJud...';
  document.getElementById('results-section').classList.remove('visible');
}
function hideLoading() { document.getElementById('loading').classList.remove('visible'); }
function showError(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('visible');
}
function clearError(id) {
  var el = document.getElementById(id);
  el.textContent = '';
  el.classList.remove('visible');
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(function() { t.classList.remove('visible'); }, 3000);
}

function searchByNumber(e) {
  e.preventDefault();
  clearError('error-numero');
  var raw = document.getElementById('input-numero').value;
  var clean = raw.replace(/\D/g, '');
  if (clean.length !== 20) {
    showError('error-numero', 'O numero do processo deve conter exatamente 20 digitos.');
    return;
  }
  var endpoint = getEndpointFromProcessNumber(raw);
  if (!endpoint) {
    showError('error-numero', 'Nao foi possivel identificar o tribunal a partir do numero informado.');
    return;
  }
  var btn = document.getElementById('btn-numero');
  btn.disabled = true;
  var tribunalLabel = (TRIBUNAL_NAMES[endpoint] || endpoint).toUpperCase();
  showLoading('Consultando ' + tribunalLabel + '...');
  queryDataJud(endpoint, {
    query: { match: { numeroProcesso: clean } },
    size: 10
  }).then(function(data) {
    var hits = (data.hits && data.hits.hits) || [];
    displayResults(hits.map(function(h) {
      var src = h._source || {};
      src._tribunal = TRIBUNAL_NAMES[endpoint] || endpoint;
      src._grauOrigem = src.grau || h._index || '';
      return src;
    }));
  }).catch(function(err) {
    showError('error-numero', 'Erro ao consultar: ' + err.message);
  }).finally(function() {
    hideLoading();
    btn.disabled = false;
  });
}

var currentResults = [];

function displayResults(results) {
  currentResults = results || [];
  var section = document.getElementById('results-section');
  var list = document.getElementById('results-list');
  var countEl = document.getElementById('results-count');
  if (!results || results.length === 0) {
    section.classList.add('visible');
    countEl.textContent = '0';
    list.innerHTML = '<div class="empty-state"><h3>Nenhum processo encontrado</h3><p>Verifique os dados informados e tente novamente.</p></div>';
    return;
  }
  section.classList.add('visible');
  countEl.textContent = results.length + ' processo' + (results.length > 1 ? 's' : '');
  list.innerHTML = results.map(function(proc, idx) { return buildProcessCard(proc, idx); }).join('');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function formatDate(d) {
  if (!d) return '--';
  try { var dt = new Date(d); if (isNaN(dt)) return d; return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch(e) { return d; }
}
function formatDateTime(d) {
  if (!d) return '--';
  try { var dt = new Date(d); if (isNaN(dt)) return d; return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); } catch(e) { return d; }
}
function getClassName(p) { return (p.classe && p.classe.nome) ? p.classe.nome : (typeof p.classe === 'string' ? p.classe : '-'); }
function getSubjects(p) { return (p.assuntos && Array.isArray(p.assuntos)) ? p.assuntos.map(function(a){return a.nome||a;}).filter(Boolean).join(', ')||'-' : '-'; }
function getOrgao(p) { return (p.orgaoJulgador && p.orgaoJulgador.nome) ? p.orgaoJulgador.nome : '-'; }
function formatPN(n) { var c=(n||'').replace(/\D/g,''); return c.length===20 ? c.replace(/^(\d{7})(\d{2})(\d{4})(\d{1})(\d{2})(\d{4})$/,'$1-$2.$3.$4.$5.$6') : n; }

function buildProcessCard(proc, idx) {
  var numero = proc.numeroProcesso || '-';
  var tribunal = proc._tribunal || '-';
  var classe = getClassName(proc);
  var assuntos = getSubjects(proc);
  var orgao = getOrgao(proc);
  var dataAj = formatDate(proc.dataAjuizamento);
  var grau = proc.grau || '-';
  var formato = (proc.formato && proc.formato.nome) ? proc.formato.nome : (proc.formato || '-');
  var movs = proc.movimentos || proc.movimento || [];
  var sorted = [].concat(movs).sort(function(a,b){return (b.dataHora||'').localeCompare(a.dataHora||'');});
  var now = new Date();
  var movsHtml = '<p style="color:var(--text-muted);font-size:0.85rem;">Nenhum movimento registrado.</p>';
  if (sorted.length > 0) {
    movsHtml = sorted.slice(0,50).map(function(m) {
      var dt = formatDateTime(m.dataHora);
      var nm = m.nome || m.complemento || '-';
      var comps = (m.complementosTabelados||[]).map(function(c){return c.nome||c.descricao||'';}).filter(Boolean).join('; ');
      var ft = (nm+' '+comps).toLowerCase();
      var isAud = /audi[eê]ncia/.test(ft);
      var ec='', badge='';
      if (isAud) { var md=m.dataHora?new Date(m.dataHora):null; var isFut=md&&md>now; ec=isFut?' audiencia audiencia-futura':' audiencia'; badge=isFut?'<span class="audiencia-badge futura">AUDIENCIA FUTURA</span>':'<span class="audiencia-badge passada">AUDIENCIA</span>'; }
      return '<div class="timeline-item'+ec+'"><div class="timeline-date">'+dt+badge+'</div><div class="timeline-desc">'+nm+'</div>'+(comps?'<div class="timeline-complement">'+comps+'</div>':'')+'</div>';
    }).join('');
  }
  return '<article class="process-card" id="card-'+idx+'">' +
    '<div class="card-header" tabindex="0" role="button" aria-expanded="false" onclick="toggleCard('+idx+')">' +
    '<span class="tribunal-badge">'+tribunal+'</span>' +
    '<div class="card-info"><div class="process-number">'+formatPN(numero)+'</div>' +
    '<div class="process-class">'+classe+'</div>' +
    '<div class="process-meta"><span>'+dataAj+'</span><span>'+orgao+'</span><span>Grau: '+grau+'</span></div></div>' +
    '<svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></div>' +
    '<div class="card-body"><div class="card-body-inner">' +
    '<div class="detail-grid">' +
    '<div class="detail-item"><div class="label">Tribunal</div><div class="value">'+tribunal+'</div></div>' +
    '<div class="detail-item"><div class="label">Classe</div><div class="value">'+classe+'</div></div>' +
    '<div class="detail-item"><div class="label">Assunto</div><div class="value">'+assuntos+'</div></div>' +
    '<div class="detail-item"><div class="label">Orgao Julgador</div><div class="value">'+orgao+'</div></div>' +
    '<div class="detail-item"><div class="label">Data Ajuizamento</div><div class="value">'+dataAj+'</div></div>' +
    '<div class="detail-item"><div class="label">Grau</div><div class="value">'+grau+'</div></div>' +
    '<div class="detail-item"><div class="label">Formato</div><div class="value">'+formato+'</div></div></div>' +
    '<div class="timeline-section"><h3>Movimentacoes ('+sorted.length+')</h3><div class="timeline">'+movsHtml+'</div></div>' +
    '<div class="card-actions">' +
    '<button class="btn-action" onclick="copyInfo('+idx+',this)" type="button">Copiar</button>' +
    '<button class="btn-action" onclick="generatePDF('+idx+')" type="button">Gerar PDF</button>' +
    '</div></div></div></article>';
}

function toggleCard(idx) {
  var card = document.getElementById('card-' + idx);
  var hdr = card.querySelector('.card-header');
  var exp = card.classList.toggle('expanded');
  hdr.setAttribute('aria-expanded', exp);
}

function copyInfo(idx, btn) {
  var p = currentResults[idx];
  if (!p) return;
  var text = 'Processo: '+formatPN(p.numeroProcesso||'')+'\nTribunal: '+(p._tribunal||'')+'\nClasse: '+getClassName(p)+'\nAssuntos: '+getSubjects(p)+'\nOrgao Julgador: '+getOrgao(p)+'\nData Ajuizamento: '+formatDate(p.dataAjuizamento)+'\nGrau: '+(p.grau||'');
  navigator.clipboard.writeText(text).then(function() {
    btn.classList.add('copied');
    var orig = btn.innerHTML;
    btn.textContent = 'Copiado!';
    setTimeout(function() { btn.classList.remove('copied'); btn.innerHTML = orig; }, 2000);
  }).catch(function() { showToast('Nao foi possivel copiar.'); });
}

function generatePDF(idx) {
  var p = currentResults[idx];
  if (!p) return;
  var jP = window.jspdf;
  var doc = new jP.jsPDF({unit:'mm',format:'a4'});
  var pw = doc.internal.pageSize.getWidth();
  var mg = 20, cw = pw-mg*2, y = mg;
  doc.setFillColor(26,35,126); doc.rect(0,0,pw,35,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(255,255,255);
  doc.text('Douglas Vilar - Consulta Processual',pw/2,15,{align:'center'});
  doc.setFontSize(9); doc.setTextColor(201,168,76);
  doc.text('Dados: DataJud/CNJ',pw/2,23,{align:'center'});
  doc.setFontSize(8); doc.setTextColor(200,200,200);
  doc.text('Gerado em: '+new Date().toLocaleString('pt-BR'),pw/2,30,{align:'center'});
  y=45;
  doc.setTextColor(26,35,126); doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('Dados do Processo',mg,y); y+=8;
  var fields=[['Numero',formatPN(p.numeroProcesso||'')],['Tribunal',p._tribunal||''],['Classe',getClassName(p)],['Assuntos',getSubjects(p)],['Orgao Julgador',getOrgao(p)],['Data Ajuizamento',formatDate(p.dataAjuizamento)],['Grau',p.grau||''],['Formato',(p.formato&&p.formato.nome)?p.formato.nome:(p.formato||'')]];
  doc.setFontSize(9);
  fields.forEach(function(f) {
    if(y>270){doc.addPage();y=mg;}
    doc.setFont('helvetica','bold');doc.setTextColor(100,100,100);
    doc.text(f[0]+':',mg,y);
    doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);
    var lines=doc.splitTextToSize(String(f[1]),cw-40);
    doc.text(lines,mg+40,y); y+=lines.length*5+3;
  });
  var movs=[].concat(p.movimentos||p.movimento||[]).sort(function(a,b){return(b.dataHora||'').localeCompare(a.dataHora||'');});
  if(movs.length>0){
    y+=6; if(y>260){doc.addPage();y=mg;}
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(26,35,126);
    doc.text('Movimentacoes ('+movs.length+')',mg,y);y+=8;
    doc.setFontSize(8);
    movs.slice(0,100).forEach(function(m){
      if(y>270){doc.addPage();y=mg;}
      doc.setFont('helvetica','bold');doc.setTextColor(26,35,126);
      doc.text(formatDateTime(m.dataHora),mg,y);
      doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
      var nl=doc.splitTextToSize(m.nome||m.complemento||'-',cw-5);
      doc.text(nl,mg,y+4); y+=4+nl.length*4+4;
    });
  }
  doc.setFontSize(7);doc.setTextColor(150,150,150);
  doc.text('Douglas Vilar - Advocacia | API Publica do DataJud',pw/2,290,{align:'center'});
  var fn='processo_'+(p.numeroProcesso||'consulta').replace(/\D/g,'').substring(0,20)+'.pdf';
  doc.save(fn);
  showToast('PDF gerado com sucesso!');
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('form-numero').addEventListener('submit', searchByNumber);
  document.getElementById('input-numero').focus();
});
</script>
