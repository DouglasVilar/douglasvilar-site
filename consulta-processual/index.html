function getEndpointFromProcessNumber(num) {
  var clean = num.replace(/\D/g, '');
  if (clean.length !== 20) return null;
  var justica = clean.substring(13, 14);
  var tribunal = clean.substring(14, 16);

function queryDataJud(endpoint, body) {
  var targetUrl = DATAJUD_BASE + '/' + endpoint + '/_search';
  var bodyStr = JSON.stringify(body);
  var proxyIndex = 0;
  function tryProxy(resolve, reject) {
    if (proxyIndex >= CORS_PROXIES.length) { tryDirect(resolve, reject); return; }
    var proxy = CORS_PROXIES[proxyIndex];
    var ct = proxy.indexOf('?') > -1 ? proxy + encodeURIComponent(targetUrl) : proxy + targetUrl;
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 20000);
    fetch(ct, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': DATAJUD_API_KEY },
      body: bodyStr, signal: controller.signal
    }).then(function(r) { clearTimeout(timeout); if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(resolve)
      .catch(function() { clearTimeout(timeout); proxyIndex++; tryProxy(resolve, reject); });
  }
  function tryDirect(resolve, reject) {
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 20000);
    fetch(targetUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': DATAJUD_API_KEY },
      body: bodyStr, signal: controller.signal
    }).then(function(r) { clearTimeout(timeout); if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(resolve)
      .catch(function(err) { clearTimeout(timeout); reject(err); });
  }
  return new Promise(function(resolve, reject) { tryProxy(resolve, reject); });
}

/* ===== UI HELPERS ===== */
function showLoading(text) {
  document.getElementById('loading').classList.add('visible');
  document.getElementById('loading-text').textContent = text || 'Consultando...';
  document.getElementById('results-section').classList.remove('visible');
}
function hideLoading() { document.getElementById('loading').classList.remove('visible'); }
function showError(id, msg) { var el = document.getElementById(id); el.textContent = msg; el.classList.add('visible'); }
function clearError(id) { var el = document.getElementById(id); el.textContent = ''; el.classList.remove('visible'); }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('visible');
  setTimeout(function() { t.classList.remove('visible'); }, 2500);
}

/* ===== FORMATACAO DE DATAS (CORRIGIDO) ===== */
function parseFlexibleDate(val) {
  if (!val) return null;
  var s = String(val).trim();
  if (s.indexOf('T') > -1 || s.indexOf('-') > -1) {
    var d = new Date(s);
    return isNaN(d.getTime()) ? null : d;
  }
  var digits = s.replace(/\D/g, '');
  if (digits.length >= 8) {
    var y = parseInt(digits.substring(0, 4));
    var mo = parseInt(digits.substring(4, 6)) - 1;
    var day = parseInt(digits.substring(6, 8));
    var h = digits.length >= 10 ? parseInt(digits.substring(8, 10)) : 0;
    var mi = digits.length >= 12 ? parseInt(digits.substring(10, 12)) : 0;
    var sec = digits.length >= 14 ? parseInt(digits.substring(12, 14)) : 0;
    var d = new Date(y, mo, day, h, mi, sec);
    return isNaN(d.getTime()) ? null : d;
  }
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function formatDate(val) {
  var d = parseFlexibleDate(val);
  if (!d) return String(val || '\u2014');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatDateTime(val) {
  var d = parseFlexibleDate(val);
  if (!d) return String(val || '\u2014');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function formatDateTimeISO(val) {
  var d = parseFlexibleDate(val);
  if (!d) return String(val || '\u2014');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' })
    + ' \u00E0s ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

/* ===== HELPERS DE DADOS ===== */
function getClassName(src) { return (src.classe && src.classe.nome) ? src.classe.nome : '\u2014'; }
function getSubjects(src) {
  if (!src.assuntos || !src.assuntos.length) return '\u2014';
  return src.assuntos.map(function(a) { return a.nome; }).join(' / ');
}
function getOrgao(src) { return (src.orgaoJulgador && src.orgaoJulgador.nome) ? src.orgaoJulgador.nome : '\u2014'; }
function getGrauLabel(grau) {
  if (!grau) return '\u2014';
  return GRAU_LABELS[grau] ? GRAU_LABELS[grau] + ' (' + grau + ')' : grau;
}
function getSigiloLabel(nivel) {
  if (nivel === undefined || nivel === null) return '\u2014';
  var labels = {0:'P\u00FAblico (0)',1:'Segredo de Justi\u00E7a (1)',2:'Sigilo M\u00EDnimo (2)',3:'Sigilo M\u00E9dio (3)',4:'Sigilo Intenso (4)',5:'Sigilo Absoluto (5)'};
  return labels[nivel] || ('N\u00EDvel ' + nivel);
}
function formatPN(n) {
  var c = String(n).replace(/\D/g, '').padStart(20, '0');
  return c.substring(0,7)+'-'+c.substring(7,9)+'.'+c.substring(9,13)+'.'+c.substring(13,14)+'.'+c.substring(14,16)+'.'+c.substring(16,20);
}

/* ===== BUSCA ===== */
var currentResults = [];

function searchByNumber() {
  var raw = document.getElementById('input-numero').value;
  var clean = raw.replace(/\D/g, '');
  clearError('error-numero');
  if (clean.length !== 20) { showError('error-numero', 'Informe um numero de processo valido com 20 digitos (NNNNNNN-DD.AAAA.J.TR.OOOO)'); return; }
  var endpoint = getEndpointFromProcessNumber(clean);
  if (!endpoint) { showError('error-numero', 'Tribunal nao identificado no numero informado.'); return; }
  var btn = document.getElementById('btn-numero');
  btn.disabled = true;
  var tribunalLabel = TRIBUNAL_NAMES[endpoint] || endpoint.replace('api_publica_','').toUpperCase();
  showLoading('Consultando ' + tribunalLabel + '...');
  var body = { query: { match: { numeroProcesso: clean } }, size: 10 };
  queryDataJud(endpoint, body).then(function(data) {
    hideLoading(); btn.disabled = false;
    var hits = (data.hits && data.hits.hits) ? data.hits.hits : [];
    var src = hits.map(function(h) { return h._source; });
    currentResults = src;
    displayResults(src);
  }).catch(function(err) {
    hideLoading(); btn.disabled = false;
    showError('error-numero', 'Erro ao consultar: ' + (err.message || 'Verifique sua conexao.'));
  });
}

function displayResults(results) {
  var section = document.getElementById('results-section');
  var list = document.getElementById('results-list');
  var countEl = document.getElementById('results-count');
  list.innerHTML = '';
  if (!results.length) {
    section.classList.add('visible');
    countEl.textContent = '0 processos';
    list.innerHTML = '<div class="empty-state"><h3>Nenhum resultado</h3><p>Nao foram encontrados processos com este numero.</p></div>';
    return;
  }
  countEl.textContent = results.length + ' processo' + (results.length > 1 ? 's' : '');
  results.forEach(function(src, i) { list.innerHTML += buildProcessCard(src, i); });
  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ===== CARD BUILDER (MELHORADO) ===== */
function buildProcessCard(src, idx) {
  var numero = src.numeroProcesso || '';
  var tribunal = src.tribunal || '';
  var classe = getClassName(src);
  var assuntos = getSubjects(src);
  var orgao = getOrgao(src);
  var dataAj = formatDate(src.dataAjuizamento);
  var grau = getGrauLabel(src.grau);
  var formato = (src.formato && src.formato.nome) ? src.formato.nome : '\u2014';
  var sistema = (src.sistema && src.sistema.nome) ? src.sistema.nome : '\u2014';
  var sigilo = getSigiloLabel(src.nivelSigilo);
  var sigiloClass = (src.nivelSigilo === 0) ? 'sigilo-0' : (src.nivelSigilo > 0 ? 'sigilo-high' : '');
  var ultimaAtt = src.dataHoraUltimaAtualizacao ? formatDateTimeISO(src.dataHoraUltimaAtualizacao) : '\u2014';

  var movs = src.movimentos || [];
  var sorted = movs.slice().sort(function(a, b) {
    return new Date(b.dataHora || 0) - new Date(a.dataHora || 0);
  });
  var now = new Date();
  var movsHtml = '';
  sorted.forEach(function(mv) {
    var dt = formatDateTime(mv.dataHora);
    var nm = mv.nome || '(sem nome)';
    var cod = mv.codigo ? ' <span class="timeline-code">[cod. ' + mv.codigo + ']</span>' : '';
    var comps = '';
    if (mv.complementosTabelados && mv.complementosTabelados.length) {
      comps = mv.complementosTabelados.map(function(c) { return c.nome || c.descricao || ''; }).filter(Boolean).join(', ');
    }
    var ft = '';
    var isAud = nm.toLowerCase().indexOf('audiencia') > -1 || nm.toLowerCase().indexOf('audi\u00EAncia') > -1;
    var ec = isAud ? ' audiencia' : '';
    var md = parseFlexibleDate(mv.dataHora);
    var isFut = md && md > now;
    if (isFut && isAud) ec = ' audiencia audiencia-futura';
    if (isAud) ft += '<div class="audiencia-badge">' + (isFut ? '\u2B50 Audiencia Futura' : '\u26A0 Audiencia') + '</div>';
    ft += '<div class="timeline-date">' + dt + '</div>';
    ft += '<div class="timeline-desc">' + nm + cod + '</div>';
    if (comps) ft += '<div class="timeline-complement">' + comps + '</div>';
    movsHtml += '<div class="timeline-item' + ec + '">' + ft + '</div>';
  });

  return '<article id="card-' + idx + '" class="process-card expanded" role="region">'
    + '<div class="card-header" onclick="toggleCard(' + idx + ')">'
    + '<div class="tribunal-badge">' + tribunal + '</div>'
    + '<div class="card-info">'
    + '<div class="process-number">' + formatPN(numero) + '</div>'
    + '<div class="process-class">' + classe + '</div>'
    + '<div class="process-meta"><span>' + dataAj + '</span><span>' + orgao + '</span><span>Grau: ' + (src.grau || '\u2014') + '</span></div>'
    + '</div>'
    + '<svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'
    + '</div>'
    + '<div class="card-body"><div class="card-body-inner">'
    + '<div class="detail-grid">'
    + '<div class="detail-item"><div class="label">Tribunal</div><div class="value">' + tribunal + '</div></div>'
    + '<div class="detail-item"><div class="label">Classe</div><div class="value">' + classe + '</div></div>'
    + '<div class="detail-item"><div class="label">Assunto</div><div class="value">' + assuntos + '</div></div>'
    + '<div class="detail-item"><div class="label">Orgao Julgador</div><div class="value">' + orgao + '</div></div>'
    + '<div class="detail-item"><div class="label">Data Ajuizamento</div><div class="value">' + dataAj + '</div></div>'
    + '<div class="detail-item"><div class="label">Grau</div><div class="value">' + grau + '</div></div>'
    + '<div class="detail-item"><div class="label">Formato</div><div class="value">' + formato + '</div></div>'
    + '<div class="detail-item"><div class="label">Sistema</div><div class="value">' + sistema + '</div></div>'
    + '<div class="detail-item"><div class="label">Sigilo</div><div class="value ' + sigiloClass + '">' + sigilo + '</div></div>'
    + '<div class="detail-item"><div class="label">Atualizado no DataJud</div><div class="value atualizado">' + ultimaAtt + '</div></div>'
    + '</div>'
    + '<div class="timeline-section"><h3>Movimentacoes (' + movs.length + ')</h3>'
    + '<div class="timeline">' + movsHtml + '</div></div>'
    + '<div class="card-actions">'
    + '<button type="button" onclick="copyInfo(' + idx + ')">Copiar</button>'
    + '<button type="button" onclick="generatePDF(' + idx + ')">Gerar PDF</button>'
    + '</div></div></div></article>';
}

/* ===== TOGGLE, COPIAR, PDF ===== */
function toggleCard(idx) {
  var card = document.getElementById('card-' + idx);
  if (card) card.classList.toggle('expanded');
}

function copyInfo(idx) {
  var p = currentResults[idx];
  if (!p) return;
  var text = 'Processo: ' + formatPN(p.numeroProcesso)
    + '\nTribunal: ' + (p.tribunal || '')
    + '\nClasse: ' + getClassName(p)
    + '\nAssunto: ' + getSubjects(p)
    + '\nOrgao Julgador: ' + getOrgao(p)
    + '\nData Ajuizamento: ' + formatDate(p.dataAjuizamento)
    + '\nGrau: ' + getGrauLabel(p.grau)
    + '\nFormato: ' + ((p.formato && p.formato.nome) ? p.formato.nome : '')
    + '\nSistema: ' + ((p.sistema && p.sistema.nome) ? p.sistema.nome : '')
    + '\nSigilo: ' + getSigiloLabel(p.nivelSigilo)
    + '\nAtualizado DataJud: ' + (p.dataHoraUltimaAtualizacao ? formatDateTimeISO(p.dataHoraUltimaAtualizacao) : '');
  if (p.movimentos && p.movimentos.length) {
    var sorted = p.movimentos.slice().sort(function(a,b) { return new Date(b.dataHora||0)-new Date(a.dataHora||0); });
    text += '\n\nMovimentacoes (' + sorted.length + '):';
    sorted.slice(0, 30).forEach(function(mv) {
      text += '\n  ' + formatDateTime(mv.dataHora) + ' - ' + (mv.nome||'') + (mv.codigo ? ' [cod.' + mv.codigo + ']' : '');
    });
    if (sorted.length > 30) text += '\n  ... e mais ' + (sorted.length - 30) + ' movimentacoes';
  }
  navigator.clipboard.writeText(text).then(function() { showToast('Informacoes copiadas!'); });
}

function generatePDF(idx) {
  var p = currentResults[idx];
  if (!p) return;
  var jP = window.jspdf || window.jsPDF;
  if (!jP) { showToast('Biblioteca PDF nao carregada'); return; }
  var doc = new jP.jsPDF();
  var pw = doc.internal.pageSize.getWidth();
  var mg = 14;
  var y = 20;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
  doc.text('Consulta Processual', pw / 2, y, { align: 'center' }); y += 10;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  doc.text('Douglas Vilar - Advocacia | Dados: DataJud/CNJ', pw / 2, y, { align: 'center' }); y += 12;
  doc.setFontSize(10);
  var fields = [
    ['Processo', formatPN(p.numeroProcesso)],
    ['Tribunal', p.tribunal || ''],
    ['Classe', getClassName(p)],
    ['Assunto', getSubjects(p)],
    ['Orgao Julgador', getOrgao(p)],
    ['Data Ajuizamento', formatDate(p.dataAjuizamento)],
    ['Grau', getGrauLabel(p.grau)],
    ['Formato', (p.formato && p.formato.nome) ? p.formato.nome : ''],
    ['Sistema', (p.sistema && p.sistema.nome) ? p.sistema.nome : ''],
    ['Sigilo', getSigiloLabel(p.nivelSigilo)],
    ['Atualizado DataJud', p.dataHoraUltimaAtualizacao ? formatDateTimeISO(p.dataHoraUltimaAtualizacao) : '']
  ];
  fields.forEach(function(f) {
    doc.setFont('helvetica', 'bold'); doc.text(f[0] + ': ', mg, y);
    var labelW = doc.getTextWidth(f[0] + ': ');
    doc.setFont('helvetica', 'normal');
    var lines = doc.splitTextToSize(f[1], pw - mg * 2 - labelW);
    doc.text(lines, mg + labelW, y); y += lines.length * 5 + 2;
  });
  y += 6;
  if (p.movimentos && p.movimentos.length) {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
    doc.text('Movimentacoes (' + p.movimentos.length + ')', mg, y); y += 7;
    doc.setFontSize(9); doc.setFont('helvetica', 'normal');
    var sorted = p.movimentos.slice().sort(function(a,b) { return new Date(b.dataHora||0)-new Date(a.dataHora||0); });
    sorted.forEach(function(mv) {
      if (y > 275) { doc.addPage(); y = 20; }
      var dt = formatDateTime(mv.dataHora);
      var nm = (mv.nome || '') + (mv.codigo ? ' [cod.' + mv.codigo + ']' : '');
      doc.setFont('helvetica', 'bold'); doc.text(dt, mg, y);
      doc.setFont('helvetica', 'normal');
      var nl = doc.splitTextToSize(nm, pw - mg * 2 - 40);
      doc.text(nl, mg + 40, y); y += nl.length * 4.5 + 3;
      if (mv.complementosTabelados && mv.complementosTabelados.length) {
        var ct = mv.complementosTabelados.map(function(c) { return c.nome || ''; }).filter(Boolean).join(', ');
        if (ct) { doc.setTextColor(120); var cl = doc.splitTextToSize(ct, pw - mg * 2 - 40); doc.text(cl, mg + 40, y); y += cl.length * 4 + 2; doc.setTextColor(0); }
      }
    });
  }
  var fn = 'processo_' + (p.numeroProcesso || 'consulta') + '.pdf';
  doc.save(fn);
  showToast('PDF gerado com sucesso!');
}

/* ===== EVENT BINDING ===== */
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('form-numero').addEventListener('submit', function(e) {
    e.preventDefault();
    searchByNumber();
  });
});
</script>
